<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PROFIT — Buddies</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="d-flex">
      <nav class="sidebar">
        <a class="dashboardTitle" href="dashboard.html">🏋️ PROFIT</a>
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link" href="dashboard.html"
              ><i class="bi bi-house"></i> Dashboard</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="buddies.html"
              ><i class="bi bi-people"></i> Buddies</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link" href="progress.html"
              ><i class="bi bi-graph-up"></i> Progress</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link" href="goals.html"
              ><i class="bi bi-bullseye"></i> Goals</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link" href="book.html"
              ><i class="bi bi-calendar-plus"></i> Book Session</a
            >
          </li>
        </ul>
        <a href="../login/login.html"
          ><button class="logout-btn">Logout</button></a
        >
      </nav>

      <main class="main-content flex-grow-1">
        <header
          class="topbar d-flex justify-content-between align-items-center"
        >
          <h5>Hello, Paul 👋</h5>
          <i class="bi bi-bell" role="button" aria-label="Notifications"></i>
        </header>

        <p class="section-heading">Buddy List</p>
        <div class="row g-3">
          <div class="col-md-4">
            <div class="card-dark buddy-card">
              <div class="d-flex align-items-center gap-3">
                <img
                  src="../images/catgym.jpg"
                  class="profile-img"
                  alt="Michael"
                />
                <div class="recommended-buddy">
                  <h4>Michael</h4>
                  <span class="badge-tag text-info">💪 Gym Enthusiast</span>
                </div>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card-dark buddy-card">
              <div class="d-flex align-items-center gap-3">
                <img
                  src="../uploads/catdumbell.jpg"
                  class="profile-img"
                  alt="Mohammad"
                />
                <div class="recommended-buddy">
                  <h4>Mohammad</h4>
                  <span class="badge-tag text-warning">🔥 High Activity</span>
                </div>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card-dark buddy-card">
              <div class="d-flex align-items-center gap-3">
                <img
                  src="../uploads/catheadphones.jpg"
                  class="profile-img"
                  alt="John"
                />
                <div class="recommended-buddy">
                  <h4>John</h4>
                  <span class="badge-tag text-primary">🏃 Runner</span>
                </div>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card-dark buddy-card">
              <div class="d-flex align-items-center gap-3">
                <img
                  src="../uploads/boxingcat.jpg"
                  class="profile-img"
                  alt="Lebron"
                />
                <div class="recommended-buddy">
                  <h4>Lebron</h4>
                  <span class="badge-tag text-light">🥊 Boxing Enthusiast</span>
                </div>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card-dark buddy-card">
              <div class="d-flex align-items-center gap-3">
                <img
                  src="../uploads/boxingdog.jpg"
                  class="profile-img"
                  alt="Obiwan"
                />
                <div class="recommended-buddy">
                  <h4>Obiwan</h4>
                  <span class="badge-tag text-success">🥊 Boxing Trainer</span>
                </div>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card-dark buddy-card">
              <div class="d-flex align-items-center gap-3">
                <img
                  src="../uploads/boxingdog2.jpg"
                  class="profile-img"
                  alt="Ippo"
                />
                <div class="recommended-buddy">
                  <h4>Ippo</h4>
                  <span class="badge-tag text-danger">🥊 Shadow Boxer</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
